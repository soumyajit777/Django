<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="#">
        <h1>Registration Form</h1>
        <label for="name">Name: </label>
        <input type="text" name="name" id="name" placeholder="Enter name"><br><br>
        <label for="email">Email: </label>
        <input type="email" name="email" id="email" placeholder="Enter email" required><br><br>
        <label for="name">Password: </label>
        <input type="password" name="password" id="password" placeholder="Enter password"><br><br>
        <label for="roll">Roll No: </label>
        <input type="text" name="roll" id="roll" placeholder="Enter Roll No"><br><br>

        <label for="department">Department: </label><br><br>
        <input type="radio" name="department" id="cse" value="cse">
        <label for="cse">CSE</label>
        <input type="radio" name="department" id="it" value="it">
        <label for="it">IT</label>
        <input type="radio" name="department" id="ee" value="ee">
        <label for="ee">EE</label>
        <input type="radio" name="department" id="ece" value="ece">
        <label for="ece">ECE</label>
        <br><br>

        <label for="language">Programming Language Known: </label><br><br>
        <input type="checkbox" name="c" id="c" value="yes">
        <label for="c">C</label><br>
        <input type="checkbox" name="java" id="java" value="yes">
        <label for="java">Java</label><br>
        <input type="checkbox" name="python" id="python" value="yes">
        <label for="python">Python</label><br>
        <input type="checkbox" name="javascript" id="javascript" value="yes">
        <label for="javascript">Javascript</label><br>
        <input type="checkbox" name="kotlin" id="kotlin" value="yes">
        <label for="kotlin">Kotlin</label>
        <br><br>

        <input type="submit" value="Submit">
</body>
</html>
